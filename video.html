<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Videos - AgriConnect</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .navbar {
      background: #2e7d32;
      padding: 12px 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
      text-align: center;
    }

    .video-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: #fafafa;
      border-radius: 5px;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .video-card iframe {
      width: 100%;
      height: 160px;
      border-radius: 5px;
    }

    .video-card h3 {
      margin: 10px 0 0;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">🌱 AgriConnect</div>
    <a href="index.html">Home</a>
  </div>

  <div class="container">
    <h2>📺 Expert Videos</h2>

    <div class="video-list">
      <!-- Example embedded YouTube videos -->
      <div class="video-card">
        <iframe src="https://www.youtube.com/embed/ntLJmHOJ0ME" frameborder="0" allowfullscreen></iframe>
        <h3>How to Grow Tomatoes Efficiently</h3>
      </div>

      <div class="video-card">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
        <h3>Modern Irrigation Techniques</h3>
      </div>

      <div class="video-card">
        <iframe src="https://www.youtube.com/embed/kJQP7kiw5Fk" frameborder="0" allowfullscreen></iframe>
        <h3>Pest Control in Organic Farming</h3>
      </div>
    </div>
  </div>
</body>
</html>
