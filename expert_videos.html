<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert Videos - AgriConnect</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .navbar {
      background: #2e7d32;
      padding: 12px 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1b5e20;
    }

    .video-list {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .video-card {
      background: #fafafa;
      border-radius: 5px;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .video-card iframe {
      width: 100%;
      height: 160px;
      border-radius: 5px;
    }

    .video-card h3 {
      margin: 10px 0 0;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">🌱 AgriConnect</div>
    <a href="index.html">Home</a>
  </div>

  <div class="container">
    <h2>🎥 Upload a New Video</h2>
    <form id="videoForm">
      <input type="text" id="videoTitle" placeholder="Video Title" required>
      <input type="text" id="videoLink" placeholder="Paste YouTube Embed Link" required>
      <button type="submit">Upload Video</button>
    </form>

    <div class="video-list" id="videoList">
      <h2>📺 Your Videos</h2>
      <!-- Uploaded videos will appear here -->
    </div>
  </div>

  <script>
    const videoForm = document.getElementById("videoForm");
    const videoList = document.getElementById("videoList");

    videoForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const title = document.getElementById("videoTitle").value;
      const link = document.getElementById("videoLink").value;

      const videoCard = document.createElement("div");
      videoCard.classList.add("video-card");
      videoCard.innerHTML = `
        <iframe src="${link}" frameborder="0" allowfullscreen></iframe>
        <h3>${title}</h3>
      `;

      videoList.appendChild(videoCard);

      videoForm.reset();
    });
  </script>
</body>
</html>
